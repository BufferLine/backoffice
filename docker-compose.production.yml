services:
  backend:
    build: ./backend
    env_file: .env.production
    expose:
      - "8000"
    restart: always
    volumes:
      - ./logs:/app/logs

  frontend:
    build: ./frontend
    environment:
      NEXT_PUBLIC_API_URL: ""
    expose:
      - "3000"
    restart: always

  nginx:
    image: nginx:alpine
    ports:
      - "127.0.0.1:${BACKOFFICE_PORT:-8080}:80"
    volumes:
      - ./nginx/production.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend
    restart: always

  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel run backoffice
    volumes:
      - ${CLOUDFLARED_CONFIG_DIR:-~/.cloudflared}:/etc/cloudflared:ro
    depends_on:
      - nginx
    restart: always
